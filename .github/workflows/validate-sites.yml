name: Validate sites.json

on:
  pull_request:
    paths:
      - 'sites.json'

jobs:
  validate:
    name: Validate sites.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate JSON syntax
        run: |
          if ! python3 -c "import json; json.load(open('sites.json'))"; then
            echo "❌ sites.json is not valid JSON"
            exit 1
          fi
          echo "✅ Valid JSON"

      - name: Validate entries
        run: |
          python3 << 'SCRIPT'
          import json
          import sys
          import re

          with open('sites.json') as f:
              data = json.load(f)

          if not isinstance(data, list):
              print("❌ sites.json must be an array")
              sys.exit(1)

          errors = []
          seen_names = []
          seen_websites = []

          for i, entry in enumerate(data):
              prefix = f"Entry {i + 1}"

              if not isinstance(entry, dict):
                  errors.append(f"{prefix}: must be an object")
                  continue

              # Check required fields
              for field in ["name", "year", "website"]:
                  if field not in entry:
                      errors.append(f"{prefix}: missing '{field}' field")

              # Validate name
              if "name" in entry:
                  if not isinstance(entry["name"], str) or len(entry["name"].strip()) == 0:
                      errors.append(f"{prefix}: 'name' must be a non-empty string")
                  elif entry["name"] in seen_names:
                      errors.append(f"{prefix}: duplicate name '{entry['name']}'")
                  else:
                      seen_names.append(entry["name"])

              # Validate year
              if "year" in entry:
                  if not isinstance(entry["year"], int):
                      errors.append(f"{prefix}: 'year' must be a number")
                  elif entry["year"] < 2000 or entry["year"] > 2030:
                      errors.append(f"{prefix}: 'year' must be between 2000 and 2030")

              # Validate website URL
              if "website" in entry:
                  url = entry["website"]
                  if not isinstance(url, str):
                      errors.append(f"{prefix}: 'website' must be a string")
                  elif not re.match(r'^https?://', url):
                      errors.append(f"{prefix}: 'website' must start with http:// or https://")
                  elif url in seen_websites:
                      errors.append(f"{prefix}: duplicate website '{url}'")
                  else:
                      seen_websites.append(url)

          if errors:
              print("❌ Validation failed:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)

          print(f"✅ All {len(data)} entries are valid")
          SCRIPT

      - name: Check badge on newly added sites
        run: |
          python3 << 'SCRIPT'
          import json, subprocess, sys, urllib.request

          MARKER = "gbp-ring.com"
          UA = "Mozilla/5.0 (compatible; gbpring-badge-check)"
          BASE = "${{ github.base_ref }}"

          subprocess.run(["git", "fetch", "origin", BASE], check=True)
          try:
              base_raw = subprocess.check_output(
                  ["git", "show", f"origin/{BASE}:sites.json"]
              ).decode()
              base_urls = {e["website"] for e in json.loads(base_raw)}
          except subprocess.CalledProcessError:
              base_urls = set()

          with open("sites.json") as f:
              current = json.load(f)
          new_entries = [e for e in current if e["website"] not in base_urls]

          if not new_entries:
              print("No new sites to check.")
              sys.exit(0)

          failures = []
          for entry in new_entries:
              url = entry["website"]
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": UA})
                  with urllib.request.urlopen(req, timeout=15) as r:
                      body = r.read(1_000_000).decode(errors="ignore").lower()
              except Exception as e:
                  failures.append(f"{url}: could not fetch ({e})")
                  continue
              if MARKER not in body:
                  failures.append(f"{url}: no link to {MARKER} found on the page")

          if failures:
              print("❌ Badge check failed:")
              for f in failures:
                  print(f"  - {f}")
              print("")
              print("Add this somewhere visible on your site, then push again:")
              print('  <a href="https://gbp-ring.com">GBP CS Webring</a>')
              sys.exit(1)

          print(f"✅ Badge found on all {len(new_entries)} new site(s)")
          SCRIPT
